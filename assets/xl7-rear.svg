<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <linearGradient id="rbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c2e"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="rbody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="60%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#922b21"/>
    </linearGradient>
    <linearGradient id="rgl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#aed6f1;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#2e86c1;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="380" fill="url(#rbg)" rx="16"/>

  <!-- Car rear body -->
  <!-- Roof -->
  <path d="M150,100 Q300,85 450,100 L450,160 L150,160 Z" fill="url(#rbody)"/>
  <!-- Roof spoiler -->
  <path d="M165,100 Q300,87 435,100 L440,96 Q300,82 160,96 Z" fill="#922b21"/>

  <!-- Rear window -->
  <path d="M165,105 L165,158 L435,158 L435,105 Q300,92 165,105 Z" fill="url(#rgl)"/>
  <!-- Window glare -->
  <path d="M178,109 Q300,97 422,109 L418,130 L182,130 Z" fill="white" opacity="0.07"/>

  <!-- C pillars -->
  <path d="M150,100 L165,105 L165,158 L150,160 Z" fill="#922b21"/>
  <path d="M450,100 L435,105 L435,158 L450,160 Z" fill="#922b21"/>

  <!-- Main rear panel -->
  <rect x="95" y="158" width="410" height="155" rx="6" fill="url(#rbody)"/>

  <!-- TAIL LIGHT STRIP (full width LED bar) -->
  <rect x="95" y="168" width="410" height="14" rx="6" fill="#e74c3c" filter="url(#glow2)"/>
  <rect x="97" y="170" width="406" height="10" rx="4" fill="#ff8a80" opacity="0.7"/>

  <!-- Left tail light -->
  <path d="M95,158 L95,225 L145,222 L145,160 Z" fill="#c0392b" opacity="0.9"/>
  <path d="M97,182" fill="none"/>
  <!-- Inner light elements -->
  <rect x="97" y="182" width="45" height="12" rx="3" fill="#ff6b6b" opacity="0.8" filter="url(#glow2)"/>
  <rect x="97" y="198" width="45" height="10" rx="3" fill="white" opacity="0.3"/>
  <rect x="97" y="210" width="45" height="10" rx="3" fill="#e74c3c" opacity="0.9"/>

  <!-- Right tail light -->
  <path d="M505,158 L505,225 L455,222 L455,160 Z" fill="#c0392b" opacity="0.9"/>
  <rect x="458" y="182" width="45" height="12" rx="3" fill="#ff6b6b" opacity="0.8" filter="url(#glow2)"/>
  <rect x="458" y="198" width="45" height="10" rx="3" fill="white" opacity="0.3"/>
  <rect x="458" y="210" width="45" height="10" rx="3" fill="#e74c3c" opacity="0.9"/>

  <!-- License plate area -->
  <rect x="225" y="265" width="150" height="36" rx="4" fill="#f0f0f0"/>
  <rect x="228" y="268" width="144" height="30" rx="3" fill="#fff"/>
  <text x="300" y="289" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold" font-family="Arial">XL7 2026</text>

  <!-- Rear bumper -->
  <rect x="95" y="313" width="410" height="50" rx="10" fill="#111"/>
  <!-- Reflectors -->
  <rect x="105" y="323" width="55" height="14" rx="4" fill="#e74c3c" opacity="0.7"/>
  <rect x="440" y="323" width="55" height="14" rx="4" fill="#e74c3c" opacity="0.7"/>
  <!-- Exhaust pipes -->
  <ellipse cx="170" cy="355" rx="18" ry="9" fill="#444"/>
  <ellipse cx="170" cy="355" rx="13" ry="6" fill="#222"/>
  <ellipse cx="430" cy="355" rx="18" ry="9" fill="#444"/>
  <ellipse cx="430" cy="355" rx="13" ry="6" fill="#222"/>
  <!-- Diffuser -->
  <rect x="215" y="335" width="170" height="20" rx="4" fill="#1a1a1a"/>
  <line x1="240" y1="335" x2="240" y2="355" stroke="#333" stroke-width="1.5"/>
  <line x1="265" y1="335" x2="265" y2="355" stroke="#333" stroke-width="1.5"/>
  <line x1="290" y1="335" x2="290" y2="355" stroke="#333" stroke-width="1.5"/>
  <line x1="315" y1="335" x2="315" y2="355" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="335" x2="340" y2="355" stroke="#333" stroke-width="1.5"/>
  <line x1="365" y1="335" x2="365" y2="355" stroke="#333" stroke-width="1.5"/>

  <!-- Rear wheels -->
  <ellipse cx="162" cy="355" rx="60" ry="26" fill="#1a1a1a"/>
  <ellipse cx="162" cy="355" rx="44" ry="19" fill="#444"/>
  <ellipse cx="162" cy="355" rx="24" ry="10" fill="#222"/>

  <ellipse cx="438" cy="355" rx="60" ry="26" fill="#1a1a1a"/>
  <ellipse cx="438" cy="355" rx="44" ry="19" fill="#444"/>
  <ellipse cx="438" cy="355" rx="24" ry="10" fill="#222"/>

  <!-- XL7 badge center rear -->
  <rect x="250" y="238" width="100" height="26" rx="6" fill="#1a1a1a"/>
  <text x="300" y="256" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="Arial" letter-spacing="2">XL7</text>

  <!-- Suzuki badge -->
  <circle cx="300" cy="230" r="14" fill="#c0392b" stroke="#ddd" stroke-width="1.5"/>
  <text x="300" y="236" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">S</text>

  <!-- Light glow on ground -->
  <ellipse cx="140" cy="370" rx="60" ry="8" fill="#e74c3c" opacity="0.15"/>
  <ellipse cx="460" cy="370" rx="60" ry="8" fill="#e74c3c" opacity="0.15"/>
  <ellipse cx="300" cy="368" rx="200" ry="8" fill="#e74c3c" opacity="0.05"/>

  <!-- Label -->
  <rect x="170" y="20" width="260" height="44" rx="12" fill="rgba(231,76,60,0.92)"/>
  <text x="300" y="38" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">REAR DESIGN REVEAL</text>
  <text x="300" y="54" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10" font-family="Arial">Full-Width LED Bar · Dual Exhaust · New Bumper</text>
</svg>
