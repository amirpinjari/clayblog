<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="body2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d35400"/>
      <stop offset="50%" style="stop-color:#e67e22"/>
      <stop offset="100%" style="stop-color:#a04000"/>
    </linearGradient>
    <radialGradient id="hl2" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:0.3"/>
    </radialGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg2)" rx="16"/>

  <!-- Car front view -->
  <!-- Hood -->
  <path d="M100,120 Q300,90 500,120 L510,220 L90,220 Z" fill="url(#body2)"/>
  <!-- Hood highlight -->
  <path d="M200,110 Q300,100 400,110 L395,150 L205,150 Z" fill="white" opacity="0.12"/>

  <!-- Windshield -->
  <path d="M120,220 L140,155 Q300,130 460,155 L480,220 Z" fill="#85c1e9" opacity="0.6"/>
  <path d="M145,210 L160,162 Q300,145 440,162 L455,210 Z" fill="white" opacity="0.08"/>

  <!-- A-pillars -->
  <path d="M120,220 L140,155 L160,165 L140,220 Z" fill="#a04000"/>
  <path d="M480,220 L460,155 L440,165 L460,220 Z" fill="#a04000"/>

  <!-- Roof -->
  <path d="M140,220 Q300,200 460,220 L460,155 Q300,130 140,155 Z" fill="#c0392b" opacity="0.1"/>

  <!-- Front face panel -->
  <rect x="90" y="220" width="420" height="110" rx="8" fill="url(#body2)"/>

  <!-- Large grille -->
  <path d="M130,240 Q300,230 470,240 L465,310 Q300,318 135,310 Z" fill="#111"/>
  <!-- Grille mesh -->
  <line x1="135" y1="258" x2="465" y2="258" stroke="#333" stroke-width="2"/>
  <line x1="135" y1="275" x2="465" y2="275" stroke="#333" stroke-width="2"/>
  <line x1="135" y1="292" x2="465" y2="292" stroke="#333" stroke-width="2"/>
  <line x1="200" y1="240" x2="200" y2="310" stroke="#333" stroke-width="2"/>
  <line x1="265" y1="237" x2="265" y2="312" stroke="#333" stroke-width="2"/>
  <line x1="335" y1="237" x2="335" y2="312" stroke="#333" stroke-width="2"/>
  <line x1="400" y1="240" x2="400" y2="310" stroke="#333" stroke-width="2"/>
  <!-- Grille chrome trim -->
  <path d="M130,240 Q300,230 470,240 L470,247 Q300,237 130,247 Z" fill="#c0392b" opacity="0.6"/>

  <!-- Suzuki logo center -->
  <circle cx="300" cy="275" r="22" fill="#c0392b" stroke="#e0e0e0" stroke-width="2"/>
  <text x="300" y="282" text-anchor="middle" fill="white" font-size="20" font-weight="bold" font-family="Arial">S</text>

  <!-- Headlights L+R -->
  <!-- Left headlight -->
  <path d="M92,228 L92,302 L132,298 L132,230 Z" fill="#f0e68c"/>
  <path d="M94,230 L94,300 L130,296 L130,232 Z" fill="url(#hl2)"/>
  <!-- DRL left -->
  <rect x="92" y="225" width="41" height="7" rx="3" fill="white" opacity="0.95"/>

  <!-- Right headlight -->
  <path d="M508,228 L508,302 L468,298 L468,230 Z" fill="#f0e68c"/>
  <path d="M506,230 L506,300 L470,296 L470,232 Z" fill="url(#hl2)"/>
  <!-- DRL right -->
  <rect x="467" y="225" width="41" height="7" rx="3" fill="white" opacity="0.95"/>

  <!-- Bumper lower -->
  <rect x="90" y="318" width="420" height="42" rx="10" fill="#1a1a1a"/>
  <!-- Air vents -->
  <rect x="105" y="326" width="90" height="26" rx="6" fill="#2c2c2c"/>
  <rect x="405" y="326" width="90" height="26" rx="6" fill="#2c2c2c"/>
  <!-- Center vent -->
  <rect x="230" y="326" width="140" height="26" rx="6" fill="#2c2c2c"/>

  <!-- Front wheels peek -->
  <ellipse cx="140" cy="355" rx="48" ry="22" fill="#1a1a1a"/>
  <ellipse cx="140" cy="355" rx="35" ry="16" fill="#444"/>
  <ellipse cx="460" cy="355" rx="48" ry="22" fill="#1a1a1a"/>
  <ellipse cx="460" cy="355" rx="35" ry="16" fill="#444"/>

  <!-- Label -->
  <rect x="170" y="20" width="260" height="44" rx="12" fill="rgba(231,76,60,0.92)"/>
  <text x="300" y="38" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">FRONT DESIGN LEAKED</text>
  <text x="300" y="54" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10" font-family="Arial">New Grille · LED DRLs · Bold Bumper</text>
</svg>
