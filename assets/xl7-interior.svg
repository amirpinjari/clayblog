<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <linearGradient id="ibg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="dash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="50%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="ambient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#f39c12;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#ibg)" rx="16"/>

  <!-- Dashboard main body -->
  <path d="M20,150 Q300,110 580,150 L580,270 L20,270 Z" fill="url(#dash)"/>
  <path d="M20,268 L580,268 L580,290 L20,290 Z" fill="#222"/>

  <!-- Ambient lighting strip on dash top -->
  <path d="M22,152 Q300,113 578,152 L578,158 Q300,119 22,158 Z" fill="url(#ambient)"/>

  <!-- MAIN INFOTAINMENT SCREEN -->
  <rect x="190" y="118" width="220" height="138" rx="10" fill="#000"/>
  <rect x="193" y="121" width="214" height="132" rx="8" fill="url(#screen)"/>
  <!-- Screen UI -->
  <rect x="197" y="125" width="206" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
  <text x="300" y="139" text-anchor="middle" fill="white" font-size="10" font-family="Arial" font-weight="bold">SUZUKI CONNECT</text>
  <!-- Map illustration -->
  <line x1="197" y1="148" x2="403" y2="148" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="280" cy="175" r="30" fill="rgba(52,152,219,0.3)" stroke="rgba(52,152,219,0.5)" stroke-width="1"/>
  <circle cx="280" cy="175" r="5" fill="#e74c3c"/>
  <!-- Quick controls -->
  <rect x="197" y="215" width="50" height="32" rx="6" fill="rgba(255,255,255,0.12)"/>
  <rect x="252" y="215" width="50" height="32" rx="6" fill="rgba(255,255,255,0.12)"/>
  <rect x="307" y="215" width="50" height="32" rx="6" fill="rgba(255,255,255,0.12)"/>
  <rect x="357" y="215" width="42" height="32" rx="6" fill="rgba(255,255,255,0.12)"/>
  <text x="222" y="236" text-anchor="middle" fill="white" font-size="8" font-family="Arial">NAV</text>
  <text x="277" y="236" text-anchor="middle" fill="white" font-size="8" font-family="Arial">MUSIC</text>
  <text x="332" y="236" text-anchor="middle" fill="white" font-size="8" font-family="Arial">PHONE</text>
  <text x="378" y="236" text-anchor="middle" fill="white" font-size="8" font-family="Arial">AC</text>

  <!-- Digital cluster -->
  <rect x="30" y="125" width="155" height="95" rx="8" fill="#000"/>
  <rect x="33" y="128" width="149" height="89" rx="6" fill="#0a0a15"/>
  <!-- Speedometer -->
  <circle cx="107" cy="172" r="36" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M107,172 m-36,0 a36,36 0 0,1 62.4,-18" fill="none" stroke="#e74c3c" stroke-width="3"/>
  <text x="107" y="168" text-anchor="middle" fill="white" font-size="18" font-weight="bold" font-family="Arial">85</text>
  <text x="107" y="180" text-anchor="middle" fill="#aaa" font-size="8" font-family="Arial">km/h</text>
  <!-- Trip info -->
  <text x="35" y="142" fill="#f39c12" font-size="8" font-family="Arial">TRIP: 142 km</text>
  <text x="35" y="208" fill="#27ae60" font-size="8" font-family="Arial">FUEL ████░  80%</text>

  <!-- Right side panel -->
  <rect x="415" y="125" width="155" height="95" rx="8" fill="#111"/>
  <!-- Climate control -->
  <text x="492" y="148" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="Arial">CLIMATE</text>
  <text x="450" y="168" text-anchor="middle" fill="#3498db" font-size="16" font-weight="bold" font-family="Arial">22°</text>
  <text x="535" y="168" text-anchor="middle" fill="#e74c3c" font-size="16" font-weight="bold" font-family="Arial">24°</text>
  <text x="450" y="180" text-anchor="middle" fill="#aaa" font-size="8" font-family="Arial">Driver</text>
  <text x="535" y="180" text-anchor="middle" fill="#aaa" font-size="8" font-family="Arial">Passenger</text>
  <!-- Fan speed -->
  <rect x="425" y="190" width="130" height="20" rx="10" fill="#222"/>
  <rect x="425" y="190" width="78" height="20" rx="10" fill="#e74c3c" opacity="0.7"/>
  <text x="492" y="204" text-anchor="middle" fill="white" font-size="8" font-family="Arial">Fan: 60%</text>

  <!-- Center console -->
  <path d="M240,270 L240,360 L360,360 L360,270 Z" fill="#2c2c2c"/>
  <!-- Gear selector -->
  <ellipse cx="300" cy="295" rx="22" ry="14" fill="#111"/>
  <circle cx="300" cy="295" r="10" fill="#444"/>
  <circle cx="300" cy="295" r="6" fill="#c0392b"/>
  <text x="300" y="299" text-anchor="middle" fill="white" font-size="7" font-weight="bold" font-family="Arial">D</text>
  <!-- Drive modes -->
  <rect x="248" y="315" width="35" height="16" rx="8" fill="#111"/>
  <rect x="290" y="315" width="40" height="16" rx="8" fill="#e74c3c" opacity="0.8"/>
  <rect x="337" y="315" width="15" height="16" rx="8" fill="#111"/>
  <text x="265" y="327" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">ECO</text>
  <text x="310" y="327" text-anchor="middle" fill="white" font-size="7" font-family="Arial">SPORT</text>
  <!-- Cup holders -->
  <ellipse cx="265" cy="345" rx="16" ry="10" fill="#111"/>
  <ellipse cx="335" cy="345" rx="16" ry="10" fill="#111"/>

  <!-- Steering wheel -->
  <circle cx="130" cy="320" r="65" fill="none" stroke="#333" stroke-width="18"/>
  <circle cx="130" cy="320" r="65" fill="none" stroke="#c0392b" stroke-width="3"/>
  <!-- Spokes -->
  <line x1="130" y1="255" x2="130" y2="285" stroke="#444" stroke-width="16" stroke-linecap="round"/>
  <line x1="130" y1="355" x2="130" y2="385" stroke="#444" stroke-width="16" stroke-linecap="round"/>
  <line x1="65" y1="320" x2="95" y2="320" stroke="#444" stroke-width="16" stroke-linecap="round"/>
  <line x1="165" y1="320" x2="195" y2="320" stroke="#444" stroke-width="16" stroke-linecap="round"/>
  <!-- Horn -->
  <ellipse cx="130" cy="320" r="30" fill="#1a1a1a"/>
  <circle cx="130" cy="320" r="16" fill="#c0392b"/>
  <text x="130" y="325" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">S</text>
  <!-- Wheel controls -->
  <rect x="82" y="302" width="26" height="36" rx="5" fill="#222"/>
  <rect x="172" y="302" width="26" height="36" rx="5" fill="#222"/>

  <!-- Seats visible at bottom -->
  <path d="M20,340 Q80,330 130,332 L135,380 L20,380 Z" fill="#1a1a1a" opacity="0.8"/>
  <path d="M580,340 Q520,330 470,332 L465,380 L580,380 Z" fill="#1a1a1a" opacity="0.8"/>

  <!-- Label -->
  <rect x="170" y="20" width="260" height="44" rx="12" fill="rgba(231,76,60,0.92)"/>
  <text x="300" y="38" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">REDESIGNED INTERIOR</text>
  <text x="300" y="54" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10" font-family="Arial">10.1" Touchscreen · Digital Cluster · Ambient Lighting</text>
</svg>
