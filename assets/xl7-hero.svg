<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="60%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="carbody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="40%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#922b21"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#85c1e9;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#2e86c1;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="wheel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#555"/>
      <stop offset="100%" style="stop-color:#222"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="headlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="100%" style="stop-color:#f9ca24;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="900" height="500" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="100" cy="60" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="200" cy="40" r="1" fill="white" opacity="0.5"/>
  <circle cx="350" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="500" cy="30" r="1" fill="white" opacity="0.8"/>
  <circle cx="650" cy="55" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="750" cy="35" r="1" fill="white" opacity="0.7"/>
  <circle cx="850" cy="70" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="780" cy="90" r="1" fill="white" opacity="0.4"/>
  <circle cx="420" cy="55" r="1" fill="white" opacity="0.5"/>

  <!-- Road -->
  <rect x="0" y="380" width="900" height="120" fill="url(#road)"/>
  <!-- Road lines -->
  <rect x="100" y="425" width="80" height="8" rx="4" fill="#f0f0f0" opacity="0.3"/>
  <rect x="280" y="425" width="80" height="8" rx="4" fill="#f0f0f0" opacity="0.3"/>
  <rect x="460" y="425" width="80" height="8" rx="4" fill="#f0f0f0" opacity="0.3"/>
  <rect x="640" y="425" width="80" height="8" rx="4" fill="#f0f0f0" opacity="0.3"/>
  <rect x="820" y="425" width="80" height="8" rx="4" fill="#f0f0f0" opacity="0.3"/>

  <!-- Ground shadow under car -->
  <ellipse cx="450" cy="385" rx="260" ry="18" fill="black" opacity="0.5"/>

  <!-- CAR BODY -->
  <!-- Main body -->
  <path d="M140,310 L140,370 Q140,380 150,380 L760,380 Q770,380 770,370 L770,310 Z" fill="url(#carbody)"/>

  <!-- Roof/cabin -->
  <path d="M240,200 Q260,175 300,168 L560,162 Q610,160 640,175 L720,220 L720,310 L180,310 Z" fill="url(#carbody)"/>

  <!-- Roof highlight -->
  <path d="M260,175 Q290,165 330,162 L530,158 Q575,157 610,168 L660,195 L260,195 Z" fill="white" opacity="0.08"/>

  <!-- Windshield -->
  <path d="M280,208 Q295,185 320,178 L545,174 Q575,173 600,188 L660,220 L660,300 L270,300 Z" fill="url(#glass)"/>
  <!-- Windshield glare -->
  <path d="M300,195 Q315,185 340,181 L420,179 L390,215 L290,215 Z" fill="white" opacity="0.15"/>

  <!-- Rear window -->
  <path d="M660,225 L715,240 L715,295 L660,298 Z" fill="url(#glass)"/>

  <!-- Side windows -->
  <rect x="195" y="225" width="65" height="65" rx="6" fill="url(#glass)"/>
  <rect x="270" y="215" width="75" height="78" rx="6" fill="url(#glass)"/>

  <!-- Door panels with lines -->
  <line x1="300" y1="315" x2="300" y2="378" stroke="#922b21" stroke-width="1.5" opacity="0.6"/>
  <line x1="490" y1="312" x2="490" y2="378" stroke="#922b21" stroke-width="1.5" opacity="0.6"/>
  <line x1="650" y1="312" x2="650" y2="378" stroke="#922b21" stroke-width="1.5" opacity="0.6"/>

  <!-- Door handles -->
  <rect x="400" y="340" width="40" height="8" rx="4" fill="#c0392b" stroke="#fff" stroke-width="1"/>
  <rect x="560" y="340" width="40" height="8" rx="4" fill="#c0392b" stroke="#fff" stroke-width="1"/>

  <!-- Body side trim -->
  <rect x="140" y="355" width="630" height="10" rx="5" fill="#7b241c" opacity="0.7"/>
  <rect x="140" y="355" width="630" height="3" rx="2" fill="white" opacity="0.15"/>

  <!-- Front bumper -->
  <path d="M140,310 L140,385 Q140,395 155,395 L230,395 L230,340 L145,340 Z" fill="#1a1a1a"/>
  <path d="M145,325 L145,380 Q145,388 158,388 L220,388 L220,325 Z" fill="#2c2c2c"/>

  <!-- Front grille -->
  <rect x="148" y="330" width="65" height="40" rx="4" fill="#111"/>
  <line x1="148" y1="342" x2="213" y2="342" stroke="#333" stroke-width="1.5"/>
  <line x1="148" y1="354" x2="213" y2="354" stroke="#333" stroke-width="1.5"/>
  <line x1="148" y1="366" x2="213" y2="366" stroke="#333" stroke-width="1.5"/>
  <line x1="170" y1="330" x2="170" y2="370" stroke="#333" stroke-width="1.5"/>
  <line x1="192" y1="330" x2="192" y2="370" stroke="#333" stroke-width="1.5"/>
  <!-- Suzuki S badge -->
  <circle cx="181" cy="350" r="10" fill="#c0392b" stroke="#gold" stroke-width="1"/>
  <text x="181" y="355" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">S</text>

  <!-- Headlights -->
  <path d="M148,295 L148,328 L225,325 L225,295 Z" fill="#f0e68c" opacity="0.9"/>
  <path d="M150,297 L150,326 L222,323 L222,297 Z" fill="url(#headlight)"/>
  <!-- DRL strip -->
  <rect x="148" y="293" width="78" height="6" rx="3" fill="#fff" opacity="0.95" filter="url(#glow)"/>

  <!-- Headlight beam -->
  <path d="M148,310 L0,270 L0,340 Z" fill="url(#headlight)" opacity="0.08"/>

  <!-- Rear bumper -->
  <path d="M760,310 L760,385 Q760,395 745,395 L680,395 L680,340 L755,340 Z" fill="#1a1a1a"/>
  <!-- Tail lights -->
  <path d="M752,295 L752,328 L685,325 L685,295 Z" fill="#e74c3c" opacity="0.9"/>
  <rect x="685" y="293" width="68" height="5" rx="2.5" fill="#ff6b6b" opacity="0.9" filter="url(#glow)"/>
  <!-- Exhaust -->
  <ellipse cx="710" cy="392" rx="12" ry="6" fill="#555"/>
  <ellipse cx="710" cy="392" rx="9" ry="4" fill="#333"/>

  <!-- WHEELS -->
  <!-- Front wheel -->
  <circle cx="270" cy="375" r="60" fill="#1a1a1a"/>
  <circle cx="270" cy="375" r="55" fill="url(#wheel)"/>
  <circle cx="270" cy="375" r="38" fill="#1a1a1a"/>
  <circle cx="270" cy="375" r="32" fill="#888"/>
  <!-- Spokes -->
  <line x1="270" y1="343" x2="270" y2="407" stroke="#1a1a1a" stroke-width="8"/>
  <line x1="238" y1="375" x2="302" y2="375" stroke="#1a1a1a" stroke-width="8"/>
  <line x1="247" y1="352" x2="293" y2="398" stroke="#1a1a1a" stroke-width="8"/>
  <line x1="293" y1="352" x2="247" y2="398" stroke="#1a1a1a" stroke-width="8"/>
  <circle cx="270" cy="375" r="14" fill="#555"/>
  <circle cx="270" cy="375" r="8" fill="#222"/>

  <!-- Rear wheel -->
  <circle cx="640" cy="375" r="60" fill="#1a1a1a"/>
  <circle cx="640" cy="375" r="55" fill="url(#wheel)"/>
  <circle cx="640" cy="375" r="38" fill="#1a1a1a"/>
  <circle cx="640" cy="375" r="32" fill="#888"/>
  <line x1="640" y1="343" x2="640" y2="407" stroke="#1a1a1a" stroke-width="8"/>
  <line x1="608" y1="375" x2="672" y2="375" stroke="#1a1a1a" stroke-width="8"/>
  <line x1="617" y1="352" x2="663" y2="398" stroke="#1a1a1a" stroke-width="8"/>
  <line x1="663" y1="352" x2="617" y2="398" stroke="#1a1a1a" stroke-width="8"/>
  <circle cx="640" cy="375" r="14" fill="#555"/>
  <circle cx="640" cy="375" r="8" fill="#222"/>

  <!-- XL7 BADGE -->
  <rect x="690" y="330" width="58" height="22" rx="5" fill="#1a1a1a"/>
  <text x="719" y="346" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">XL7</text>

  <!-- TOP LABEL -->
  <rect x="270" y="30" width="360" height="60" rx="16" fill="rgba(231,76,60,0.9)"/>
  <text x="450" y="55" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="Arial">2026 SUZUKI XL7 FACELIFT</text>
  <text x="450" y="76" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12" font-family="Arial">LEAKED AHEAD OF GLOBAL DEBUT</text>
</svg>
